services:
  - type: web
    name: smartmenu
    runtime: python
    plan: free
    region: frankfurt          # closest free region to Tashkent + EU

    # python -m pip guarantees pip and python share the same interpreter
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python run.py

    # Render health-check — marks deploy healthy once this returns 200
    healthCheckPath: /api/menu

    envVars:
      # ── Secrets (enter values in Render Dashboard, never hardcode here) ──
      - key: BOT_TOKEN
        sync: false            # Render will prompt you to enter this value

      - key: NOTIFY_CHAT_ID
        sync: false            # Render will prompt you to enter this value

      # ── Non-secret config ──
      - key: BOT_USERNAME
        value: "@my_smart_menu_bot"

      - key: APP_HOST
        value: "0.0.0.0"

      # Pin Python version via env var (correct Render syntax)
      - key: PYTHON_VERSION
        value: "3.11.4"
